name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Build, test, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Build
        run: cargo build --workspace --all-targets --all-features --verbose

      # Run the full behavior suite with every feature enabled, in normal PR CI
      # (not deferred to the release workflow), so feature-specific regressions
      # are caught before merge.
      - name: Test (all features)
        run: cargo test --workspace --all-features --verbose

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    # `-D warnings` is a lint gate for stable; the MSRV job only needs to prove
    # the workspace still *compiles* on the advertised minimum compiler, so
    # don't fail it on benign lint differences between 1.85 and stable.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85 (declared MSRV)
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      # Verify the advertised `rust-version = "1.85"` compatibility promise: a
      # change that accidentally uses a newer language/std feature fails here
      # even though it compiles on current stable. 1.85 is the real floor: the
      # dependency tree pulls in edition-2024 crates (zeroize, hashbrown,
      # indexmap, getrandom, ...) that require Cargo 1.85+.
      - name: Check on MSRV (all features)
        run: cargo check --workspace --all-targets --all-features --verbose
