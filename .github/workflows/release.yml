name: Release

# Fully automatic release on merge to main:
#
#   1. `version`  — reads [workspace.package] version from Cargo.toml and
#                   checks whether tag v<version> already exists. If it does,
#                   everything downstream is skipped (ordinary merges are
#                   no-ops; only a version bump releases).
#   2. `verify`   — full workspace verification at the merge commit.
#   3. `release`  — tags v<version>, creates the GitHub Release (notes taken
#                   from the matching CHANGELOG.md section), and publishes
#                   all 22 crates to crates.io tier by tier (PUBLISHING.md).
#
# Publishing requires the CRATE_TOKEN repository secret (a crates.io API
# token with publish scope). Publishes are idempotent: crates already at
# this version on crates.io are skipped, so a partially failed run can be
# re-run safely via workflow_dispatch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Detect new version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      is_new: ${{ steps.check.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          set -euo pipefail
          VERSION=$(cargo metadata --format-version 1 --no-deps \
            | python3 -c 'import json,sys; m=json.load(sys.stdin); print(next(p["version"] for p in m["packages"] if p["name"]=="agent-framework-core"))')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already tagged — nothing to release."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION is untagged — releasing."
          fi

  verify:
    name: Verify at merge commit
    needs: version
    if: needs.version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace --all-features
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - run: cargo fmt --all -- --check
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --all-features
      - run: cargo build -p agent-framework-examples --examples

  release:
    name: Tag, GitHub Release, publish
    needs: [version, verify]
    if: needs.version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Validate CRATE_TOKEN is set
        env:
          CRATE_TOKEN: ${{ secrets.CRATE_TOKEN }}
        run: |
          if [[ -z "${CRATE_TOKEN}" ]]; then
            echo "::error::The CRATE_TOKEN GitHub repository secret is not set. Add a crates.io API token with publish scope under Settings > Secrets > Actions, named CRATE_TOKEN, before releasing."
            exit 1
          fi

      - name: Tag v${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
        env:
          VERSION: ${{ needs.version.outputs.version }}

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          # Release notes: the CHANGELOG.md section for this version
          # (between its "## [x.y.z]" heading and the next "## [" heading).
          python3 - "$VERSION" > notes.md <<'PY'
          import re, sys
          version = sys.argv[1]
          text = open("CHANGELOG.md").read()
          m = re.search(rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)", text, re.M | re.S)
          print(m.group(1).strip() if m else f"Release v{version}. See CHANGELOG.md.")
          PY
          gh release create "v$VERSION" --title "v$VERSION" --notes-file notes.md
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}

      - name: Publish to crates.io (tier by tier)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATE_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          already_published() {
            curl -fsSL -o /dev/null \
              -H "User-Agent: agent-framework-rs release workflow (github.com/${GITHUB_REPOSITORY})" \
              "https://crates.io/api/v1/crates/$1/$VERSION" 2>/dev/null
          }
          publish() {
            if already_published "$1"; then
              echo "$1@$VERSION already on crates.io — skipping"
              return
            fi
            # Retry once after a pause: a just-published dependency may not
            # be indexed yet when the next tier starts.
            cargo publish -p "$1" || { sleep 30; cargo publish -p "$1"; }
          }
          publish agent-framework-core
          for c in a2a bedrock copilotstudio cosmos declarative gemini hosting mcp mem0 openai purview redis; do
            publish agent-framework-$c
          done
          for c in azure foundry-local github-copilot mistral ollama; do
            publish agent-framework-$c
          done
          for c in anthropic azure-ai-search foundry; do
            publish agent-framework-$c
          done
          publish agent-framework
